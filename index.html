<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Demo Overblik</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Demo konti overblik">
      <button class="help-button" type="button" aria-label="Hjælp">
        <span>?</span>
      </button>

      <section class="content" aria-label="Konti">
        <h1>Overblik</h1>

        <div class="section-title">
          <h2>Konti</h2>
          <div class="section-actions">
            <button class="circle-button circle-button--green" type="button" aria-label="Tilføj">
              <span>+</span>
            </button>
            <button class="circle-button" type="button" aria-label="Flere valg">
              <span class="dots">...</span>
            </button>
          </div>
        </div>

        <section class="account-card" aria-label="Demo konti">
          <article class="account-row">
            <div class="account-copy">
              <h3>Studiekonto</h3>
              <p>7845 9010214</p>
            </div>
            <div class="account-values">
              <button class="money money--primary" type="button" data-key="main-0" title="Skift demobeløb">3.111,24</button>
              <button class="money money--secondary" type="button" data-key="sub-0" title="Skift demobeløb">417,44</button>
            </div>
            <span class="chevron" aria-hidden="true"></span>
          </article>

          <article class="account-row">
            <div class="account-copy">
              <h3>Madkonto</h3>
              <p>7845 1443978</p>
            </div>
            <div class="account-values">
              <button class="money money--primary" type="button" data-key="main-1" title="Skift demobeløb">6.444,85</button>
              <button class="money money--secondary" type="button" data-key="sub-1" title="Skift demobeløb">4.320,65</button>
            </div>
            <span class="chevron" aria-hidden="true"></span>
          </article>

          <article class="account-row">
            <div class="account-copy">
              <h3>Budgetkonto</h3>
              <p>7845 1379354</p>
            </div>
            <div class="account-values account-values--single">
              <button class="money money--primary" type="button" data-key="main-2" title="Skift demobeløb">1.250,64</button>
            </div>
            <span class="chevron" aria-hidden="true"></span>
          </article>

          <article class="account-row">
            <div class="account-copy">
              <h3>Opsparing</h3>
              <p>7845 1379362</p>
            </div>
            <div class="account-values account-values--single">
              <button class="money money--primary" type="button" data-key="main-3" title="Skift demobeløb">20.500,00</button>
            </div>
            <span class="chevron" aria-hidden="true"></span>
          </article>
        </section>
      </section>

      <nav class="tabbar" aria-label="Hovedmenu">
        <button class="tabbar-item tabbar-item--active" type="button">
          <span class="nav-icon nav-icon--overview" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </span>
          <span>Overblik</span>
        </button>
        <button class="tabbar-item" type="button">
          <span class="nav-icon nav-icon--transfer" aria-hidden="true"></span>
          <span>Overfør</span>
        </button>
        <button class="tabbar-item tabbar-item--mail" type="button">
          <span class="nav-icon nav-icon--mail" aria-hidden="true">
            <span></span>
          </span>
          <span class="mail-badge">830</span>
          <span>Indbakke</span>
        </button>
        <button class="tabbar-item" type="button">
          <span class="nav-icon nav-icon--menu" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          <span>Menu</span>
        </button>
      </nav>

      <div class="demo-note" aria-label="Fiktiv demo">Fiktiv demo</div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
